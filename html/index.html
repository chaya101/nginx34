<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ngingg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 640px;
        }

        .badge {
            display: inline-block;
            background: #22c55e;
            color: #052e16;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .info-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1rem;
        }

        .info-card .label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 0.35rem;
        }

        .info-card .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #38bdf8;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.85rem 1.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Deployed</div>
        <h1>ngingg</h1>
        <p class="subtitle">nginx is running on EC2</p>

        <div class="info-grid">
            <div class="info-card">
                <div class="label">App</div>
                <div class="value">nginx</div>
            </div>
            <div class="info-card">
                <div class="label">Region</div>
                <div class="value">us-east-1</div>
            </div>
            <div class="info-card">
                <div class="label">Target</div>
                <div class="value">EC2</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="dot"></div>
            <span>Service is live and healthy</span>
        </div>
    </div>
</body>
</html>
